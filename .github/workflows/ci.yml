name: CI

# Analyze + test on every push and PR to main. Catches regressions like the
# flaky-DB lock automatically instead of relying on a manual local run.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The test suite runs the real SQLite engine via sqflite_common_ffi, which
      # loads the system libsqlite3 on Linux — install it before running tests.
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0 libsqlite3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
